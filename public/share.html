<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shared deck — EchoDeck</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="/" style="color:inherit;text-decoration:none"><span class="logo">◈</span> EchoDeck</a>
        <span class="tagline">shared deck · read-only</span>
      </div>
      <div class="study-actions" id="share-actions" style="display:none">
        <select id="export-format">
          <option value="anki">Anki (.tsv)</option>
          <option value="csv">CSV</option>
          <option value="json">JSON</option>
        </select>
        <button id="export-btn" class="ghost">Export</button>
      </div>
    </header>

    <main>
      <div class="study-head panel" id="share-head">
        <div>
          <h2 id="share-title">Loading…</h2>
          <p class="muted small" id="share-meta"></p>
        </div>
      </div>
      <div id="share-cards" class="card-list"></div>
      <p class="muted small center" id="share-foot"></p>
    </main>

    <audio id="player" preload="auto"></audio>

    <script src="/share-page.js" type="module"></script>
  </body>
</html>
