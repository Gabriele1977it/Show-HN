<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EchoDeck — audio into flashcards & shadowing</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">◈</span> EchoDeck
        <span class="tagline">native audio → flashcards & shadowing</span>
      </div>
      <nav class="tabs">
        <button class="tab is-active" data-view="build">Build</button>
        <button class="tab" data-view="study">Study</button>
      </nav>
    </header>

    <main>
      <!-- BUILD VIEW -->
      <section id="view-build" class="view is-active">
        <div class="grid">
          <form id="build-form" class="card panel">
            <h2>New deck</h2>
            <p class="muted">
              Paste a transcript of native-language audio. Lines with timestamps
              (<code>[00:12]</code>, <code>1:02:33</code>, SRT/VTT) become
              shadowing loops; plain text is split into sentence cards.
            </p>

            <label>Title<input name="title" placeholder="e.g. NHK Easy News — 2026-06" required /></label>
            <label>Language<input name="language" placeholder="e.g. Japanese" /></label>

            <label>Audio
              <div class="row">
                <input name="audioUrl" id="audioUrl" placeholder="https://… or upload →" />
                <input type="file" id="audioFile" accept="audio/*" hidden />
                <button type="button" id="uploadBtn" class="ghost">Upload</button>
              </div>
              <span id="uploadStatus" class="muted small"></span>
            </label>

            <label>
              <span class="row between">
                <span>Transcript</span>
                <span>
                  <input type="file" id="subFile" accept=".srt,.vtt,.txt,text/*" hidden />
                  <button type="button" id="subBtn" class="ghost small">Import .srt / .vtt</button>
                </span>
              </span>
              <textarea name="transcript" rows="10" placeholder="[00:00] こんにちは、今日のニュースです。
[00:04] 天気は晴れ、気温は二十五度です。

…or paste an SRT/VTT block:
1
00:00:01,000 --> 00:00:04,000
Subtitle text here"></textarea>
            </label>

            <div class="row between">
              <label class="inline">Max card length
                <input name="maxChars" type="number" value="180" min="40" max="500" />
              </label>
              <button type="submit" class="primary">Build deck</button>
            </div>
            <p id="build-error" class="error"></p>
          </form>

          <div class="panel">
            <h2>Your decks</h2>
            <ul id="deck-list" class="deck-list"></ul>
          </div>
        </div>
      </section>

      <!-- STUDY VIEW -->
      <section id="view-study" class="view">
        <div id="study-empty" class="panel center muted">
          Pick a deck from the <strong>Build</strong> tab to study.
        </div>

        <div id="study-deck" class="hidden">
          <div class="study-head panel">
            <div>
              <h2 id="study-title"></h2>
              <p class="muted small" id="study-meta"></p>
            </div>
            <div class="study-actions">
              <select id="export-format">
                <option value="anki">Anki (.tsv)</option>
                <option value="csv">CSV</option>
                <option value="json">JSON</option>
              </select>
              <button id="export-btn" class="ghost">Export</button>
              <button id="review-btn" class="primary">Review due <span id="due-badge" class="badge">0</span></button>
            </div>
          </div>

          <!-- Shadowing / card list -->
          <div id="card-list" class="card-list"></div>
        </div>
      </section>
    </main>

    <!-- Review overlay -->
    <div id="review-overlay" class="overlay hidden">
      <div class="review-box">
        <button id="review-close" class="close" aria-label="Close">×</button>
        <div class="review-progress"><span id="review-count"></span></div>
        <div id="review-front" class="review-front"></div>
        <div id="review-back" class="review-back hidden"></div>

        <div class="shadow-controls" id="review-shadow">
          <button id="rev-play" class="ghost">▶ Play loop</button>
          <label class="inline small">Speed
            <select id="rev-speed">
              <option value="0.6">0.6×</option>
              <option value="0.75">0.75×</option>
              <option value="1" selected>1×</option>
            </select>
          </label>
        </div>

        <div class="review-buttons">
          <button id="show-answer" class="primary wide">Show answer</button>
          <div id="grade-buttons" class="grades hidden">
            <button data-grade="again" class="g-again">Again</button>
            <button data-grade="hard" class="g-hard">Hard</button>
            <button data-grade="good" class="g-good">Good</button>
            <button data-grade="easy" class="g-easy">Easy</button>
          </div>
        </div>
      </div>
    </div>

    <audio id="player" preload="auto"></audio>
    <script src="/app.js" type="module"></script>
  </body>
</html>
