<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--SEO-->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
    <script src="/arena-theme.js"></script>
    <style>
        :root {
            --bg-primary: #f6f8fc; --bg-secondary: #ffffff; --bg-card: #ffffff;
            --bg-input: #f1f4f9; --text-primary: #0b0d10; --text-secondary: #4a5568;
            --text-muted: #94a3b8; --border-color: #e2e8f0; --accent: #7c3aed;
            --accent-light: #ede9fe; --accent-gradient: linear-gradient(135deg, #7c3aed, #4f46e5);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04); --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --radius: 16px; --radius-sm: 10px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        [data-theme="dark"] {
            --bg-primary: #0b0d10; --bg-secondary: #14171c; --bg-card: #1c2027;
            --bg-input: #262b33; --text-primary: #f1f5f9; --text-secondary: #94a3b8;
            --text-muted: #64748b; --border-color: #2d333b; --accent-light: #2d1b4e;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.4); --shadow-md: 0 8px 24px rgba(0,0,0,0.5);
        }
        * , *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }
        header {
            background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);
            padding: 14px 0; position: sticky; top: 0; z-index: 50;
        }
        header .container { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; color: var(--text-primary); text-decoration: none; }
        .logo span { background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        header nav { margin-left: auto; display: flex; gap: 18px; }
        header nav a { color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        header nav a:hover { color: var(--text-primary); }
        .theme-toggle {
            background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 40px;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem;
        }
        .hero { text-align: center; padding: 44px 0 24px; }
        .hero .badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 14px; border-radius: 40px;
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
            background: var(--accent-light); color: var(--accent); margin-bottom: 14px;
        }
        .hero h1 { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.6px; }
        .hero .sub { color: var(--text-secondary); margin-top: 8px; }
        .scorecard-panel {
            background: var(--bg-secondary); border-radius: var(--radius-sm);
            border: 1px solid var(--border-color); padding: 20px 24px; margin: 24px 0;
        }
        .scorecard-panel h5 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .scorecard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .scorecard-item {
            background: var(--bg-card); padding: 12px 14px; border-radius: var(--radius-sm);
            border: 1px solid var(--border-color); text-align: center;
        }
        .scorecard-item .rank { font-size: 1.4rem; font-weight: 800; }
        .scorecard-item .sname { font-weight: 600; font-size: 0.9rem; }
        .scorecard-item .selo { font-size: 0.75rem; color: var(--text-secondary); }
        .scorecard-item .sdim { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
        .medal-gold { color: #f59e0b; } .medal-silver { color: #94a3b8; } .medal-bronze { color: #d97706; }
        .comparison-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .result-card { background: var(--bg-secondary); border-radius: var(--radius-sm); border: 1px solid var(--border-color); overflow: hidden; display: flex; flex-direction: column; }
        .result-card .card-head { padding: 14px 18px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: var(--bg-card); }
        .result-card .agent-info { display: flex; align-items: center; gap: 10px; }
        .result-card .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; color: #fff; }
        .result-card .score-badge { font-weight: 700; font-size: 1.05rem; background: var(--bg-input); padding: 2px 14px; border-radius: 40px; border: 1px solid var(--border-color); }
        .result-card .output {
            margin: 14px 18px; font-size: 0.82rem; color: var(--text-secondary); white-space: pre-wrap;
            word-break: break-word; max-height: 220px; overflow-y: auto; background: var(--bg-primary);
            padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border-color);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; line-height: 1.7;
        }
        .result-card .card-footer { padding: 10px 18px; border-top: 1px solid var(--border-color); display: flex; gap: 14px; flex-wrap: wrap; font-size: 0.72rem; color: var(--text-muted); background: var(--bg-card); }
        .cta-row { text-align: center; margin: 32px 0 12px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: var(--radius-sm);
            font-weight: 600; font-size: 0.95rem; border: none; cursor: pointer; text-decoration: none;
            background: var(--accent-gradient); color: #fff;
        }
        .btn:hover { box-shadow: 0 8px 20px rgba(124,58,237,0.3); }
        .demo-notice {
            display: flex; align-items: center; justify-content: center; gap: 8px; margin: 0 auto 8px;
            padding: 8px 20px; width: fit-content; max-width: 100%; border-radius: 40px;
            border: 1px dashed var(--accent); background: var(--accent-light); color: var(--accent);
            font-size: 0.78rem; font-weight: 600;
        }
        footer { padding: 28px 0; border-top: 1px solid var(--border-color); background: var(--bg-secondary); text-align: center; margin-top: 40px; }
        footer p { color: var(--text-secondary); font-size: 0.82rem; }
        footer a { color: var(--accent); text-decoration: none; }
        .empty { text-align: center; padding: 80px 24px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a class="logo" href="/arena">⚡ <span>Agent Arena</span></a>
            <nav>
                <a href="/arena/leaderboard">Leaderboard</a>
                <a href="/arena">Run your own →</a>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
            </nav>
        </div>
    </header>

    <main class="container" id="main">
        <div class="empty" id="loading">Loading scorecard…</div>
    </main>

    <footer>
        <div class="container">
            <p>Published from <a href="/arena">Agent Arena</a> · A MadLabs experiment · <span id="footerNote">outputs and scores are simulated</span></p>
        </div>
    </footer>

    <script src="/arena-share.js"></script>
</body>
</html>
