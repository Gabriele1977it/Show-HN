# ─────────────────────────────────────────────────────────────────────────────
# Render Blueprint for HOLTO (this branch: claude/holto-app-improvements-8cefxv).
#
# Low-cost setup: ONE web service + ONE database (2 billable items). The flight
# monitor runs INSIDE the web service (ENABLE_MONITOR=1), so there's no separate
# paid worker.
#   • holto-api   the web API + in-process flight monitor  → your backend URL
#   • holto-db    a managed PostgreSQL database             (created automatically)
#
# You do NOT need to set any secrets to get it running:
#   - DATABASE_URL is wired in automatically from holto-db
#   - SESSION_SECRET is generated automatically
#   - the database tables are created automatically on first deploy
#   - OPENAI_API_KEY / AIRLABS_API_KEY are OPTIONAL — the app works without them
#     (add them later to turn on the AI wording and live flight tracking).
# See holto/DEPLOY.md for the plain-English walkthrough (incl. how to go cheaper).
#
# IMPORTANT: the existing "MadLabs" Blueprint tracks the `main` branch and manages
# the live echodeck + madlabs-hub services. THIS file (on the HOLTO branch) is a
# HOLTO-only blueprint, added as a SEPARATE Blueprint Instance that tracks this
# branch — so the two live apps are never touched. Do NOT merge this branch into
# `main` as-is. See holto/DEPLOY.md.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: holto-db
    plan: basic-256mb
    databaseName: holto
    region: frankfurt
    postgresMajorVersion: "16"

services:
  # ── Web API (also runs the flight monitor in-process) ─────────────────────
  - type: web
    name: holto-api
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: holto
    branch: claude/holto-app-improvements-8cefxv
    autoDeploy: true
    buildCommand: npm install -g pnpm@10.33.0 && pnpm install --frozen-lockfile --prod=false --filter "@workspace/api-server..." && pnpm --filter @workspace/api-server build
    # Create/update the database tables automatically before each release.
    preDeployCommand: pnpm --filter @workspace/db run push-force
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: holto-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      # Run the flight monitor inside this service (no separate worker to pay for).
      - key: ENABLE_MONITOR
        value: "1"
      - key: MONITOR_POLL_MS
        value: "900000"
      # ── Optional — leave blank to start; add later in the dashboard ──
      - key: OPENAI_API_KEY      # warmer AI wording (deterministic copy is used if blank)
        sync: false
      - key: AIRLABS_API_KEY     # live flight status + monitoring (off if blank)
        sync: false
      - key: EXPO_ACCESS_TOKEN   # higher push throughput (optional)
        sync: false
      - key: EMAIL_WEBHOOK_URL   # email fallback for alerts (optional)
        sync: false
      - key: PUBLIC_URL          # set to this service's URL after first deploy (web CORS)
        sync: false
      - key: STRIPE_SECRET_KEY   # only if you turn on paid plans
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
