name: HOLTO E2E (visual smoke)

# Playwright smoke + screenshot checks against a running deployment. Not part of
# the per-push gate (it hits a live URL and needs baseline screenshots committed
# first — generate them with `cd holto/e2e && npm test -- --update-snapshots`).
# Run on demand, or weekly to catch drift on the live site.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test"
        required: false
        default: "https://app.holtotravel.com"
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

defaults:
  run:
    working-directory: holto/e2e

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke + visual tests
        run: npm test
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://app.holtotravel.com' }}
          # Optional: set these as repo secrets to also check signed-in pages.
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: holto/e2e/playwright-report/
          retention-days: 14
