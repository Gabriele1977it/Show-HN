name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # EchoDeck (root app) tests — its test script is scoped to its own test/ dir.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm test

  # HOLTO (holto/ pnpm workspace) — api-server unit tests.
  holto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm
        run: npm i -g pnpm@10.33.0
      - name: Install HOLTO api-server + deps
        working-directory: holto
        run: pnpm install --frozen-lockfile --prod=false --filter "@workspace/api-server..."
      - name: Test HOLTO api-server
        working-directory: holto
        run: pnpm --filter @workspace/api-server test
