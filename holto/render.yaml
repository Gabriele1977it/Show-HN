# Render Blueprint — deploys HOLTO as three linked services:
#   • web    : the Express API server
#   • worker : the background flight-monitoring poller (push + email alerts)
#   • db     : a managed PostgreSQL database (injected into both services)
#
# HOLTO is self-contained under `holto/`, so connect this as its OWN Render
# Blueprint (New + → Blueprint → point at `holto/render.yaml`). The MadLabs
# repo's root render.yaml (EchoDeck) is untouched.
#
# Set every `sync: false` var in the Render dashboard — they are secrets and
# are deliberately NOT stored in git.

databases:
  - name: holto-db
    plan: basic-256mb
    databaseName: holto
    postgresMajorVersion: "16"

services:
  # ── API server ─────────────────────────────────────────────────────────────
  - type: web
    name: holto-api
    runtime: node
    plan: starter
    rootDir: holto
    branch: claude/holto-app-improvements-8cefxv
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: holto-db
          property: connectionString
      - key: PUBLIC_URL
        sync: false        # e.g. https://holto-api.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: AIRLABS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # ── Monitoring worker ──────────────────────────────────────────────────────
  - type: worker
    name: holto-monitor
    runtime: node
    plan: starter
    rootDir: holto
    branch: claude/holto-app-improvements-8cefxv
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/monitor-worker build
    startCommand: pnpm --filter @workspace/monitor-worker start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: holto-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: AIRLABS_API_KEY
        sync: false
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: EMAIL_WEBHOOK_URL
        sync: false
      - key: MONITOR_POLL_MS
        value: "900000"
